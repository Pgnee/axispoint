<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>aXisPoint — Hero Mark Directions</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
 body{margin:0;background:#fff;color:#132A4C;font-family:'Public Sans',sans-serif}
 .wrap{max-width:1100px;margin:0 auto;padding:56px 32px}
 h1{font:800 34px Archivo,sans-serif;margin:0 0 6px}
 p.sub{color:#7a8494;margin:0 0 44px}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
 .card{border:1px solid #D3D8E0;border-radius:14px;padding:28px;text-align:center;background:#fff}
 .card h2{font:800 20px Archivo,sans-serif;margin:0 0 4px}
 .card .tag{font:600 12px 'Public Sans';letter-spacing:.08em;text-transform:uppercase;color:#1D6FA5;margin-bottom:20px}
 .stage{display:flex;justify-content:center;align-items:center;min-height:360px}
 @media(max-width:900px){.grid{grid-template-columns:1fr}}
</style></head><body>
<div class="wrap">
<h1>aXisPoint — Hero Mark, two directions</h1>
<p class="sub">Live animation. Sweep acquires the ~1&nbsp;cm lesion; slice cross-fades CT&nbsp;&harr;&nbsp;MRI between passes. Placeholder synthetic slices.</p>
<div class="grid">
  <div class="card"><h2>Direction A</h2><div class="tag">The Wake</div><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="320" height="320" viewBox="0 0 100 100" role="img" aria-labelledby="axpHeroTitleA">
  <title id="axpHeroTitleA">aXisPoint Radiology - acquisition sweep locating a 1 cm lesion on an axial slice</title>

  <!-- ==================================================================
       DIRECTION A - "THE WAKE"
       A luminous acquisition edge circles the viewport, leaving a
       decaying wake. As it crosses the lesion, a lock-ring collapses
       onto it and a leader line calls it out. CT / MRI cross-fade
       every two passes.

       TUNABLE CONSTANTS (re-derive when real slices drop in)
       IMG_X = 6   IMG_Y = 12   IMG_S = 76
         (inscribed circle: CX = 44, CY = 50, R = 38)
       LESION_NX = 0.635   LESION_NY = 0.580   LESION_D_FRAC = 0.04
         LESION_X = IMG_X + LESION_NX * IMG_S = 54.26
         LESION_Y = IMG_Y + LESION_NY * IMG_S = 56.08
         LESION_R = LESION_D_FRAC / 2 * IMG_S = 1.52
       LESION_ANGLE = atan2(LESION_Y-CY, LESION_X-CX) = 30.7 deg
       SWEEP_DUR = 9s, sweep start angle = -75 deg
         lesion hit fraction = (30.7 - (-75)) / 360 = 0.2935
       MODALITY_CYCLE = 4 sweeps = 36s (CT two passes, MRI two passes)
       ================================================================== -->

  <defs>
    <clipPath id="axpAImgClip"><circle cx="44" cy="50" r="37.6"/></clipPath>
    <clipPath id="axpASweepClip"><circle cx="44" cy="50" r="38"/></clipPath>

    <radialGradient id="axpABackGlow" cx="0.42" cy="0.40" r="0.62">
      <stop offset="0" stop-color="#1D6FA5" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#132A4C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#132A4C" stop-opacity="0"/>
    </radialGradient>

    <!-- leading edge: dark at hub, incandescent at rim -->
    <linearGradient id="axpAEdge" gradientUnits="userSpaceOnUse" x1="49" y1="50" x2="81.5" y2="50">
      <stop offset="0" stop-color="#3FA9DC" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#3FA9DC" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#E8F5FE" stop-opacity="1"/>
    </linearGradient>

    <filter id="axpASoften" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="axpAGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <filter id="axpABloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- cool clinical tint pulled toward the brand blues -->
    <filter id="axpACool" x="-5%" y="-5%" width="110%" height="110%">
      <feColorMatrix type="matrix" values="0.84 0 0 0 0.01  0 0.93 0 0 0.045  0 0 1 0 0.10  0 0 0 1 0"/>
    </filter>
  </defs>

  <!-- ambient depth behind the viewport -->
  <circle cx="43" cy="48" r="47" fill="url(#axpABackGlow)"/>
  <!-- viewport plate -->
  <circle cx="44" cy="50" r="38.6" fill="#0B1A30"/>

  <!-- axial slices: CT base, MRI cross-fades in every two sweeps -->
  <g clip-path="url(#axpAImgClip)" filter="url(#axpACool)">
    <image href="img/ct-axial.png" xlink:href="img/ct-axial.png" x="6" y="12" width="76" height="76"/>
    <image href="img/mri-axial.png" xlink:href="img/mri-axial.png" x="6" y="12" width="76" height="76" opacity="0">
      <animate attributeName="opacity" dur="36s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.458;0.5;0.958;1"/>
    </image>
  </g>

  <!-- acquisition sweep: bright leading edge with a decaying luminous wake -->
  <g clip-path="url(#axpASweepClip)">
    <g transform="rotate(-75 44 50)">
      <animateTransform attributeName="transform" type="rotate"
                        from="-75 44 50" to="285 44 50" dur="9s" repeatCount="indefinite"/>
      <!-- wake: stacked 10-degree sectors, blurred into a smooth decay -->
      <g fill="#E8F5FE" filter="url(#axpASoften)">
        <path d="M 44 50 L 81.42 43.40 A 38 38 0 0 1 82.00 50.00 Z" fill-opacity="0.17"/>
        <path d="M 44 50 L 79.71 37.00 A 38 38 0 0 1 81.42 43.40 Z" fill-opacity="0.12"/>
        <path d="M 44 50 L 76.91 31.00 A 38 38 0 0 1 79.71 37.00 Z" fill-opacity="0.085"/>
        <path d="M 44 50 L 73.11 25.58 A 38 38 0 0 1 76.91 31.00 Z" fill-opacity="0.055"/>
        <path d="M 44 50 L 68.42 20.89 A 38 38 0 0 1 73.11 25.58 Z" fill-opacity="0.032"/>
        <path d="M 44 50 L 63.00 17.09 A 38 38 0 0 1 68.42 20.89 Z" fill-opacity="0.015"/>
      </g>
      <!-- leading edge -->
      <line x1="49" y1="50" x2="81.5" y2="50" stroke="#3FA9DC" stroke-width="1.8"
            stroke-linecap="round" opacity="0.5" filter="url(#axpAGlow)"/>
      <line x1="49" y1="50" x2="81.5" y2="50" stroke="url(#axpAEdge)" stroke-width="0.6"
            stroke-linecap="round"/>
      <circle cx="81" cy="50" r="1" fill="#E8F5FE" opacity="0.9" filter="url(#axpAGlow)"/>
    </g>
  </g>

  <!-- quiet frame: one hairline and two asymmetric arcs. no ticks, no facets. -->
  <circle cx="44" cy="50" r="39.5" fill="none" stroke="#8B95A5" stroke-width="0.25" opacity="0.35"/>
  <path d="M 36.88 90.38 A 41 41 0 0 1 3.62 57.12" fill="none"
        stroke="#3FA9DC" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
  <path d="M 51.12 9.63 A 41 41 0 0 1 79.51 29.50" fill="none"
        stroke="#D3D8E0" stroke-width="0.35" stroke-linecap="round" opacity="0.45"/>

  <!-- lesion acquisition: bloom, collapsing lock-ring, leader line, label -->
  <g opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite"
             values="0;0;1;1;0;0" keyTimes="0;0.28;0.305;0.52;0.68;1"/>
    <circle cx="54.26" cy="56.08" r="2.8" fill="#3FA9DC" opacity="0.55" filter="url(#axpABloom)"/>
    <circle cx="54.26" cy="56.08" r="9" fill="none" stroke="#E8F5FE" stroke-width="0.5">
      <animate attributeName="r" dur="9s" repeatCount="indefinite" calcMode="spline"
               values="9;9;2.6;2.6;9" keyTimes="0;0.28;0.335;0.6;1"
               keySplines="0 0 1 1;0.16 0.84 0.24 1;0 0 1 1;0 0 1 1"/>
    </circle>
    <path d="M 56.1 54.2 L 63.5 46.8 L 86 46.8" fill="none" stroke="#D3D8E0"
          stroke-width="0.3" opacity="0.9" stroke-dasharray="33" stroke-dashoffset="33">
      <animate attributeName="stroke-dashoffset" dur="9s" repeatCount="indefinite"
               values="33;33;0;0;33" keyTimes="0;0.30;0.365;0.68;1"/>
    </path>
    <g opacity="0" font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif">
      <animate attributeName="opacity" dur="9s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.34;0.375;0.52;0.66;1"/>
      <text x="86" y="45.4" text-anchor="end" font-size="4" font-weight="600" fill="#FFFFFF">1 cm</text>
      <text x="86" y="50.2" text-anchor="end" font-size="2.3" letter-spacing="0.35" fill="#8B95A5">LESION DETECTED</text>
    </g>
  </g>

  <!-- modality tag, swaps with the cross-fade -->
  <g font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif" font-size="2.6" letter-spacing="0.7">
    <text x="6" y="95.5" fill="#8B95A5" opacity="1">AXIAL &#183; CT
      <animate attributeName="opacity" dur="36s" repeatCount="indefinite"
               values="1;1;0;0;1" keyTimes="0;0.458;0.5;0.958;1"/>
    </text>
    <text x="6" y="95.5" fill="#8B95A5" opacity="0">AXIAL &#183; MRI
      <animate attributeName="opacity" dur="36s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.458;0.5;0.958;1"/>
    </text>
  </g>
</svg>
</div></div>
  <div class="card"><h2>Direction B</h2><div class="tag">The Axis Finds the Point</div><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="320" height="320" viewBox="0 0 100 100" role="img" aria-labelledby="axpHeroTitleB">
  <title id="axpHeroTitleB">aXisPoint Radiology - a band of resolution develops an axial slice; two axes converge on a 1 cm finding</title>

  <!-- ==================================================================
       DIRECTION B - "THE AXIS FINDS THE POINT"
       The slice rests dim and slightly soft. A wide band of resolution
       rotates across it, developing the image to full sharpness as it
       passes. When the band crosses the lesion, two full-bleed hairline
       axes slide in and intersect exactly on it - the axis, the point -
       and a thin annotation ring is drawn around the finding, the way a
       radiologist circles one. CT / MRI cross-fade every two passes.

       TUNABLE CONSTANTS (re-derive when real slices drop in)
       IMG_X = 12   IMG_Y = 8   IMG_S = 80
         (inscribed circle: CX = 52, CY = 48, R = 40)
       LESION_NX = 0.635   LESION_NY = 0.580   LESION_D_FRAC = 0.04
         LESION_X = IMG_X + LESION_NX * IMG_S = 62.8
         LESION_Y = IMG_Y + LESION_NY * IMG_S = 54.4
         LESION_R = LESION_D_FRAC / 2 * IMG_S = 1.6
       LESION_ANGLE = atan2(LESION_Y-CY, LESION_X-CX) = 30.7 deg
       SWEEP_DUR = 10s, sweep start angle = -90 deg
         lesion hit fraction = (30.7 - (-90)) / 360 = 0.3352
       MODALITY_CYCLE = 4 sweeps = 40s (CT two passes, MRI two passes)
       ================================================================== -->

  <defs>
    <clipPath id="axpBImgClip"><circle cx="52" cy="48" r="39.6"/></clipPath>
    <clipPath id="axpBEdgeClip"><circle cx="52" cy="48" r="40"/></clipPath>

    <radialGradient id="axpBBackGlow" cx="0.46" cy="0.42" r="0.64">
      <stop offset="0" stop-color="#1D6FA5" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#132A4C" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#132A4C" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="axpBEdge" gradientUnits="userSpaceOnUse" x1="57" y1="48" x2="91.5" y2="48">
      <stop offset="0" stop-color="#3FA9DC" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#3FA9DC" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#E8F5FE" stop-opacity="1"/>
    </linearGradient>

    <!-- axes are brightest exactly where they meet the lesion -->
    <linearGradient id="axpBAxisH" gradientUnits="userSpaceOnUse" x1="2" y1="54.4" x2="98" y2="54.4">
      <stop offset="0" stop-color="#3FA9DC" stop-opacity="0.05"/>
      <stop offset="0.633" stop-color="#E8F5FE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#3FA9DC" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="axpBAxisV" gradientUnits="userSpaceOnUse" x1="62.8" y1="2" x2="62.8" y2="98">
      <stop offset="0" stop-color="#3FA9DC" stop-opacity="0.05"/>
      <stop offset="0.546" stop-color="#E8F5FE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#3FA9DC" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="axpBSoftMask" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="axpBUnresolved" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="0.45"/>
    </filter>
    <filter id="axpBGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <filter id="axpBBloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <filter id="axpBCool" x="-5%" y="-5%" width="110%" height="110%">
      <feColorMatrix type="matrix" values="0.84 0 0 0 0.01  0 0.93 0 0 0.045  0 0 1 0 0.10  0 0 0 1 0"/>
    </filter>

    <!-- rotating 100-degree band of resolution: sharp leading edge,
         stepped-and-blurred trailing decay -->
    <mask id="axpBSweepMask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect x="0" y="0" width="100" height="100" fill="#000000"/>
      <g filter="url(#axpBSoftMask)">
        <g transform="rotate(-90 52 48)">
          <animateTransform attributeName="transform" type="rotate"
                            from="-90 52 48" to="270 52 48" dur="10s" repeatCount="indefinite"/>
          <path d="M 52 48 L 93.35 32.95 A 44 44 0 0 1 96.00 48.00 Z" fill="#FFFFFF" fill-opacity="0.95"/>
          <path d="M 52 48 L 85.70 19.71 A 44 44 0 0 1 93.35 32.95 Z" fill="#FFFFFF" fill-opacity="0.70"/>
          <path d="M 52 48 L 74.00 9.90 A 44 44 0 0 1 85.70 19.71 Z" fill="#FFFFFF" fill-opacity="0.48"/>
          <path d="M 52 48 L 59.64 4.67 A 44 44 0 0 1 74.00 9.90 Z" fill="#FFFFFF" fill-opacity="0.28"/>
          <path d="M 52 48 L 44.36 4.67 A 44 44 0 0 1 59.64 4.67 Z" fill="#FFFFFF" fill-opacity="0.13"/>
        </g>
      </g>
    </mask>
  </defs>

  <!-- ambient depth -->
  <circle cx="51" cy="46" r="48" fill="url(#axpBBackGlow)"/>
  <!-- viewport plate -->
  <circle cx="52" cy="48" r="40.2" fill="#0B1A30"/>

  <!-- UNRESOLVED layer: dim, slightly soft -->
  <g clip-path="url(#axpBImgClip)">
    <g filter="url(#axpBCool)">
      <g filter="url(#axpBUnresolved)">
        <image href="img/ct-axial.png" xlink:href="img/ct-axial.png" x="12" y="8" width="80" height="80"/>
        <image href="img/mri-axial.png" xlink:href="img/mri-axial.png" x="12" y="8" width="80" height="80" opacity="0">
          <animate attributeName="opacity" dur="40s" repeatCount="indefinite"
                   values="0;0;1;1;0" keyTimes="0;0.4625;0.5;0.9625;1"/>
        </image>
      </g>
    </g>
    <circle cx="52" cy="48" r="39.6" fill="#0B1A30" opacity="0.5"/>
  </g>

  <!-- RESOLVED layer: full brightness, revealed by the rotating band -->
  <g clip-path="url(#axpBImgClip)" mask="url(#axpBSweepMask)" filter="url(#axpBCool)">
    <image href="img/ct-axial.png" xlink:href="img/ct-axial.png" x="12" y="8" width="80" height="80"/>
    <image href="img/mri-axial.png" xlink:href="img/mri-axial.png" x="12" y="8" width="80" height="80" opacity="0">
      <animate attributeName="opacity" dur="40s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.4625;0.5;0.9625;1"/>
    </image>
  </g>

  <!-- leading edge of the band -->
  <g clip-path="url(#axpBEdgeClip)">
    <g transform="rotate(-90 52 48)">
      <animateTransform attributeName="transform" type="rotate"
                        from="-90 52 48" to="270 52 48" dur="10s" repeatCount="indefinite"/>
      <line x1="57" y1="48" x2="91.5" y2="48" stroke="#3FA9DC" stroke-width="1.6"
            stroke-linecap="round" opacity="0.45" filter="url(#axpBGlow)"/>
      <line x1="57" y1="48" x2="91.5" y2="48" stroke="url(#axpBEdge)" stroke-width="0.55"
            stroke-linecap="round"/>
    </g>
  </g>

  <!-- frame: one hairline, a heavy cradle arc low-right, a whisper arc high-left -->
  <circle cx="52" cy="48" r="40.6" fill="none" stroke="#8B95A5" stroke-width="0.25" opacity="0.3"/>
  <path d="M 93.85 61.60 A 44 44 0 0 1 67.05 89.35" fill="none"
        stroke="#1D6FA5" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>
  <path d="M 8.17 44.16 A 44 44 0 0 1 23.72 14.29" fill="none"
        stroke="#D3D8E0" stroke-width="0.35" stroke-linecap="round" opacity="0.5"/>

  <!-- the finding: two full-bleed axes converge on the point,
       then a thin annotation ring is drawn around it -->
  <g opacity="0">
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite"
             values="0;0;1;1;0;0" keyTimes="0;0.33;0.355;0.56;0.67;1"/>
    <line x1="2" y1="54.4" x2="98" y2="54.4" stroke="url(#axpBAxisH)" stroke-width="0.4"
          stroke-dasharray="96" stroke-dashoffset="96">
      <animate attributeName="stroke-dashoffset" dur="10s" repeatCount="indefinite"
               values="96;96;0;0;96" keyTimes="0;0.332;0.39;0.67;1"/>
    </line>
    <line x1="62.8" y1="2" x2="62.8" y2="98" stroke="url(#axpBAxisV)" stroke-width="0.4"
          stroke-dasharray="96" stroke-dashoffset="96">
      <animate attributeName="stroke-dashoffset" dur="10s" repeatCount="indefinite"
               values="96;96;0;0;96" keyTimes="0;0.342;0.40;0.67;1"/>
    </line>
    <circle cx="62.8" cy="54.4" r="2.4" fill="#3FA9DC" opacity="0.5" filter="url(#axpBBloom)"/>
    <circle cx="62.8" cy="54.4" r="0.9" fill="#FFFFFF"/>
    <!-- radiologist's annotation ring, drawn on -->
    <ellipse cx="62.8" cy="54.4" rx="3.6" ry="3.1" fill="none" stroke="#E8F5FE"
             stroke-width="0.45" stroke-linecap="round" transform="rotate(-80 62.8 54.4)"
             stroke-dasharray="21" stroke-dashoffset="21">
      <animate attributeName="stroke-dashoffset" dur="10s" repeatCount="indefinite"
               values="21;21;0;0;21" keyTimes="0;0.39;0.44;0.62;1"/>
    </ellipse>
    <g opacity="0" font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif">
      <animate attributeName="opacity" dur="10s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.40;0.435;0.56;0.65;1"/>
      <text x="97" y="52.6" text-anchor="end" font-size="3.4" font-weight="600" fill="#FFFFFF">1 cm</text>
      <text x="97" y="58.2" text-anchor="end" font-size="2.2" letter-spacing="0.5" fill="#8B95A5">IDENTIFIED</text>
    </g>
  </g>

  <!-- modality tag, top-left, swaps with the cross-fade -->
  <g font-family="'Avenir Next','Segoe UI',Helvetica,Arial,sans-serif" font-size="2.6" letter-spacing="0.7">
    <text x="4" y="6.5" fill="#8B95A5" opacity="1">CT &#183; AXIAL
      <animate attributeName="opacity" dur="40s" repeatCount="indefinite"
               values="1;1;0;0;1" keyTimes="0;0.4625;0.5;0.9625;1"/>
    </text>
    <text x="4" y="6.5" fill="#8B95A5" opacity="0">MR &#183; AXIAL
      <animate attributeName="opacity" dur="40s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.4625;0.5;0.9625;1"/>
    </text>
  </g>
</svg>
</div></div>
</div>
</div></body></html>
